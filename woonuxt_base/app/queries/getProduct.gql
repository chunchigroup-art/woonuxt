query getProduct($slug: ID!, $frontEndUrl: String = "") {
  product(id: $slug, idType: SLUG) {
    name
    type
    databaseId
    id
    fullYoastHead(sanitize: true, frontendUrl: $frontEndUrl)
    metaData {
      id
      key
      value
    }
    slug
    sku
    description
    rawDescription: description(format: RAW)
    shortDescription

    # ====================== 新增 3 组核心字段 ======================
    # 1. 最小起订量（MOQ 校验必须）
    minQuantity
    # 2. 运费计算：重量
    weight
    # 3. 运费计算：尺寸
    dimensions {
      length
      width
      height
    }
    # 4. 运费计算：配送分类
    shippingClass {
      name
      slug
    }
    # ==============================================================

    ...ProductWithAttributes
    ...ProductCategories
    ...Terms
    ...SimpleProduct
    ...VariableProduct
    ...ExternalProduct

    related(first: 5) {
      nodes {
        ...SimpleProduct
        ...VariableProduct
        ...ExternalProduct
      }
    }
    reviews(first: 100) {
      averageRating
      edges {
        rating
        node {
          ...Comment
        }
      }
    }
  }
}

fragment ProductWithAttributes on ProductWithAttributes {
  attributes {
    nodes {
      ...ProductAttribute
    }
  }
}

fragment ProductAttribute on ProductAttribute {
  variation
  name
  id
  options
  label
  scope
  ... on GlobalProductAttribute {
    terms(where: { orderby: TERM_ORDER, order: ASC }) {
      nodes {
        name
        slug
        taxonomyName
        databaseId
      }
    }
  }
}